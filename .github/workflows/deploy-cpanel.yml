name: Deploy to cPanel

# Triggers on every push to main / master
on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build & Deploy (FTP)
    runs-on: ubuntu-latest

    # All secrets surfaced as env vars so the linter knows about them
    env:
      FTP_HOST:           ${{ secrets.FTP_HOST }}
      FTP_USERNAME:       ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD:       ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR:     ${{ secrets.FTP_SERVER_DIR }}
      DEPLOY_HOOK_URL:    ${{ secrets.DEPLOY_HOOK_URL }}

    steps:

      # ── 1. SOURCE ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. PHP ─────────────────────────────────────────────────────────────────
      #   Match the PHP version your cPanel server actually runs.
      #   Check it in cPanel → MultiPHP Manager and update '8.3' if needed.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, pdo_mysql, tokenizer, xml, curl, zip, intl
          tools: composer:v2
          coverage: none

      # ── 3. COMPOSER ────────────────────────────────────────────────────────────
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key:          ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 4. NODE + NPM ──────────────────────────────────────────────────────────
      #   This project uses npm (package-lock.json). Do not change to pnpm/yarn.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'          # uses package-lock.json as cache key automatically

      - name: Install frontend dependencies
        run: npm ci              # exact reproducible install from package-lock.json

      # ── 5. BUILD FRONTEND ASSETS ───────────────────────────────────────────────
      - name: Build frontend assets (Vite + Tailwind)
        run: npm run build

      # ── 6. PREPARE STORAGE SKELETON ────────────────────────────────────────────
      #   Creates the directory structure so FTP uploads it.
      #   The .gitkeep files ensure empty dirs are included.
      #   Real logs, sessions, and compiled views on the server are excluded
      #   from FTP in step 9 so they are never overwritten.
      - name: Prepare storage directories
        run: |
          mkdir -p storage/app/public \
                   storage/framework/cache/data \
                   storage/framework/sessions \
                   storage/framework/views \
                   storage/logs \
                   bootstrap/cache

          touch storage/app/public/.gitkeep \
                storage/framework/cache/data/.gitkeep \
                storage/framework/sessions/.gitkeep \
                storage/framework/views/.gitkeep \
                storage/logs/.gitkeep \
                bootstrap/cache/.gitkeep

      # ── 7. VERIFY BUILD ARTEFACTS ──────────────────────────────────────────────
      #   Catches a bad build before it reaches production.
      - name: Verify build artefacts
        run: |
          test -f public/.htaccess           || { echo "::error::Missing public/.htaccess";     exit 1; }
          test -f public/index.php           || { echo "::error::Missing public/index.php";     exit 1; }
          test -f public/deploy-hook.php     || { echo "::error::Missing deploy-hook.php";      exit 1; }
          test -f public/build/manifest.json || { echo "::error::Missing Vite manifest.json";   exit 1; }
          test -d vendor                     || { echo "::error::vendor/ directory missing";    exit 1; }
          echo "✓ All artefacts present"

      # ── 8. UPLOAD VIA LFTP ─────────────────────────────────────────────────────
      #   node_modules is deleted before upload — assets are already compiled so
      #   it isn't needed on the server, and removing it guarantees lftp never
      #   touches those tens of thousands of files regardless of glob matching.
      - name: Remove node_modules before upload
        run: rm -rf node_modules

      - name: Upload files via lftp
        env:
          FTP_HOST:       ${{ env.FTP_HOST }}
          FTP_USERNAME:   ${{ env.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ env.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ env.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq lftp

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" -e "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set net:reconnect-interval-max 90;
            mirror -R --verbose --continue --only-newer --parallel=2 \
              --exclude-glob .git \
              --exclude-glob .gitattributes \
              --exclude-glob .github \
              --exclude-glob tests \
              --exclude-glob .phpunit.cache \
              --exclude-glob .env \
              --exclude-glob .env.* \
              --exclude-glob public/hot \
              --exclude-glob public/storage \
              --exclude-glob 'storage/logs/*.log' \
              --exclude-glob 'storage/framework/sessions/sess_*' \
              --exclude-glob 'storage/framework/views/*.php' \
              --exclude-glob 'bootstrap/cache/*.php' \
              --exclude-glob .DS_Store \
              --exclude-glob Thumbs.db \
              --exclude-glob npm-debug.log \
              --exclude-glob pnpm-debug.log \
              ./ $FTP_SERVER_DIR;
            bye
          "

      # ── 9. TRIGGER DEPLOYMENT HOOK ─────────────────────────────────────────────
      #   Calls deploy-hook.php on the live server via HTTPS.
      #   The hook runs:  migrate → optimize:clear → config/route/view/event cache
      #                   → storage:link
      #   It is protected by DEPLOY_HOOK_TOKEN which must match .env on the server.
      #
      #   On first deploy the hook also auto-generates APP_KEY if .env is missing it.
      - name: Run migrations & rebuild caches (via deploy hook)
        run: |
          echo "Calling deployment hook..."

          HTTP_RESPONSE=$(curl --silent \
            --max-time 180 \
            --retry 3 \
            --retry-delay 5 \
            --write-out "\n%{http_code}" \
            "${{ env.DEPLOY_HOOK_URL }}")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_CODE"
          echo ""
          echo "Hook output:"
          echo "$HTTP_BODY" | python3 -m json.tool 2>/dev/null || echo "$HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo ""
            echo "::error::Deploy hook returned HTTP $HTTP_CODE — check the output above."
            exit 1
          fi

          echo ""
          echo "✓ Deploy complete"

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS
# Settings → Secrets and variables → Actions → New repository secret
#
#  FTP_HOST          cPanel FTP hostname      e.g. ftp.yourdomain.com
#  FTP_USERNAME      FTP username
#  FTP_PASSWORD      FTP password
#  FTP_SERVER_DIR    Remote upload path       e.g. /public_html/ticketminta/
#                    Must end with a trailing slash.
#
#  DEPLOY_HOOK_URL   Full HTTPS URL to hook   e.g. https://yourdomain.com/deploy-hook.php
#  DEPLOY_HOOK_TOKEN A long random secret     e.g. run: openssl rand -base64 40
#                    ↑ Also add this to your server's .env as:
#                      DEPLOY_HOOK_TOKEN=same-value-here
#
# ─────────────────────────────────────────────────────────────────────────────
# FIRST-DEPLOY CHECKLIST  (do these once via cPanel File Manager / phpMyAdmin)
# ─────────────────────────────────────────────────────────────────────────────
#
#  1. Upload your app once (or let the workflow do it).
#
#  2. In cPanel File Manager, open the app folder and create .env:
#       Copy .env.example → .env
#       Edit .env and set:
#         APP_NAME=TicketMinta
#         APP_ENV=production
#         APP_DEBUG=false
#         APP_URL=https://yourdomain.com
#
#         DB_CONNECTION=mariadb
#         DB_HOST=localhost
#         DB_PORT=3306
#         DB_DATABASE=your_db_name
#         DB_USERNAME=your_db_user
#         DB_PASSWORD=your_db_password
#
#         SESSION_DRIVER=database
#         CACHE_STORE=database
#         QUEUE_CONNECTION=database
#
#         DEPLOY_HOOK_TOKEN=your-random-token   ← same value as the GitHub secret
#
#  3. Point your domain document root to:
#       /home/username/ticketminta/public
#     (cPanel → Domains → Document Root)
#
#  4. Push to main — the workflow uploads files and calls the deploy hook.
#     The hook auto-generates APP_KEY if missing, runs migrations, and
#     rebuilds all caches. Check the GitHub Actions log for full output.
#
#  5. After first deploy, seed the database once:
#     Open https://yourdomain.com/deploy-hook.php?token=YOUR_TOKEN&seed=1
#     ... or add a one-time seeder call in the hook (see deploy-hook.php).
#     Alternatively run the seeder via cPanel's PHP script runner if available.
#
#  6. Set up the scheduler cron in cPanel → Cron Jobs:
#     * * * * * php /home/username/ticketminta/artisan schedule:run >> /dev/null 2>&1
#
# ─────────────────────────────────────────────────────────────────────────────